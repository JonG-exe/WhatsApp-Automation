<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SidePanel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Montserrat", "Poppins";
        }
        body {
            background-color: #F7F5F3;
        }
        h1 {
            font-size: 20px;
        }
        h3 {
            margin-bottom: 4px;
        }
        button {
            cursor: pointer;
        }
        /* .copy-all-btn  {
            padding: 4px 8px;
            background-color: rgb(91, 167, 253);
            border-radius: 4px;
            color: white;
            margin-bottom: 16px;
            border: none;
        } */
        #open-maps,
        #go-btn,
        #run-whatsapp-btn,
        #open-whatsapp-btn,
        #stop-maps-btn,
        #stop-whatsapp-btn,
        .copy-all-btn {
            background-color: rgb(217, 253, 211);
            border-radius: 8px;
            padding: 8px;
            border: 1px solid green;
            box-shadow: 3px 3px 2px rgba(0, 0, 0, 0.1);
        }
        .copy-all-btn {
            margin-top: 8px;
        }
        #stop-maps-btn,
        #stop-whatsapp-btn {
            background-color: rgb(120, 119, 119);
            color: white;
        }
        section {
            margin: 8px;
        }
        #status-and-utilities {
            width: 100%;
            margin-top: 40px;
        }
        #status {
            min-width: 80px;
            height: 36px;
            background-color: rgb(255, 255, 255);
            padding: 8px;
            display: block;
            line-height: 19px;
            
            margin-right: 16px;
            border-radius: 8px;
            border: 1px solid green;
        }
        .flash-status {
            animation: flash 1.75s ease-in-out;
        }
        @keyframes flash {
            0% {
                background-color: rgba(77, 255, 0, 0);
            }
            25% {
                background-color: rgba(74, 211, 16, 0.4);
            }
            35% {
                background-color: rgba(74, 211, 16, 0.20);
            }
            50% {
                background-color: rgba(74, 211, 16, 0.6);
            }
            100% {
                background-color: rgba(77, 255, 0, 0);
            }
        }
        .phone-numbers {
            font-size: 14px;
        }
        .phone-numbers div {
            margin-bottom: 10px;
        }
        #phone-numbers-section {
            max-height: 100px;
            min-height: 100px;
            background-color: white;
            border: 1px solid green;
            overflow-y: auto;
            border-radius: 8px;
            padding: 12px;
        }
        /* #phone-numbers-section::scrollbar, 
        #phone-numbers-section::-webkit-scrollbar {
            display: none;
        }  */

        #allow-send-message {
            color: black;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        #allow-send-message-checkbox {
            margin-left: 8px;
        }

        #find-number {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        #find-number input,
        #find-number textarea {
            width: 95%;
            padding: 8px 4px;
            margin-top: 8px;
        }

        #find-number textarea {
            height: 175px;
        }
        #found-numbers {
            padding: 20px 0px;
        }
    </style>
</head>
<body>
    <section style="margin-bottom: 16px">
        <h1>WhatsApp Automation</h1>
    </section>

    <section class="google-maps">
        <button id="open-maps">Open Maps</button>
        <button id="go-btn">Go</button>
        <button id="stop-maps-btn">Stop Scrape</button>
    </section>

    <section class="whatsapp">
        <button id="open-whatsapp-btn">Open W.App</button>
        <button id="run-whatsapp-btn">Run W.App</button>
        <button id="stop-whatsapp-btn">Stop Messaging</button>
    </section>

    <section id="allow-send-message">
        <label for="allow-send-message-checkbox">Send Messages</label>
        <input type="checkbox" name="allow-send-message-checkbox" id="allow-send-message-checkbox">
    </section>

    <section id="status-and-utilities">
        <h3>Status</h3>
        <span id="status"></span>
        <button class="copy-all-btn">Copy All</button>
    </section>

    <section id="phone-numbers-section">
        <div class="phone-numbers"></div>
    </section>

    <section id="find-number">
        <h4>Find Company By Number</h4>
        <select name="" id="select-map-search-query" >
            <option>--- Select A Query ---</option>
        </select>
        <input type="text" name="" id="find-number-input" placeholder="Enter phone #">
        <div id="found-numbers"></div>
    </section>



    <script src="./sidepanel.js"></script>

</body>
</html>
