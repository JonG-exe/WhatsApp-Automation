<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SidePanel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Montserrat", "Poppins", sans-serif;
            background-color: #F7F5F3;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 100vh;
        }
        .panel-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 4px;
        }
        .panel-header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: -0.2px;
        }
        .panel-header i {
            font-size: 20px;
            color: #3B6D11;
        }
        .wa-badge {
            background: #EAF3DE;
            color: #3B6D11;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            border: 0.5px solid #C0DD97;
        }
        .card {
            background: #ffffff;
            border: 1px solid #e5e5e0;
            border-radius: 12px;
            padding: 14px;
        }
        .card-label {
            font-size: 11px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 10px;
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 9px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            border: 1px solid #d0d0ca;
            background: #ffffff;
            color: #1a1a1a;
            transition: background 0.12s;
        }
        button:hover {
            background: #f5f5f0;
        }
        button i {
            font-size: 14px;
        }
        button.primary {
            background: #EAF3DE;
            border-color: #C0DD97;
            color: #3B6D11;
            transition: all 0.1s;

                                    background-color: rgb(217, 253, 211);
                                    border-radius: 8px;
                                    padding: 8px;
                                    border: 1px solid green;
                                    box-shadow: 3px 3px 2px rgba(0, 0, 0, 0.1);
        }
        button:active {
            scale: 0.95;
            transition: all 0.2s;
        }
        button.primary:hover {
            /* background: #d6ebbc; */
            background-color: #97dd8b;

        }
        button.stop {
            background: #f5f5f0;
            color: #666;
            border-color: #ddd;
        }
        button.stop:hover {
            background: #d6d6d6;
        }
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .toggle-label {
            font-size: 13px;
            color: #1a1a1a;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toggle-label i {
            font-size: 15px;
            color: #888;
        }
        .toggle {
            position: relative;
            width: 36px;
            height: 20px;
            cursor: pointer;
            display: block;
        }
        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-track {
            position: absolute;
            inset: 0;
            background: #ccc;
            border-radius: 20px;
            transition: background 0.2s;
        }
        .toggle input:checked + .toggle-track {
            background: #639922;
        }
        .toggle-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: white;
            transition: transform 0.2s;
            pointer-events: none;
        }
        .toggle input:checked ~ .toggle-thumb {
            transform: translateX(16px);
        }
        .status-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: #f5f5f0;
            border: 1px solid #e0e0da;
            color: #555;
            flex: 1;
        }
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #639922;
            flex-shrink: 0;
        }
        .copy-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #d0d0ca;
            background: #ffffff;
            color: #555;
            font-family: inherit;
        }
        .copy-btn:hover {
            background: #f5f5f0;
        }
        .numbers-list {
            max-height: 90px;
            overflow-y: auto;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .phone-numbers div {
            font-size: 12px;
            color: #666;
            padding: 3px 0;
            border-bottom: 0.5px solid #ebebeb;
        }
        .phone-numbers div:last-child {
            border-bottom: none;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }
        .form-group:last-child {
            margin-bottom: 0;
        }
        .form-label {
            font-size: 11px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        select,
        #find-number-input {
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #d0d0ca;
            background: #ffffff;
            color: #1a1a1a;
            font-size: 13px;
            font-family: inherit;
        }
        select:focus,
        #find-number-input:focus {
            outline: none;
            border-color: #639922;
        }
        #found-numbers {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
            max-height: 180px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="panel-header">
        <i class="ti ti-brand-whatsapp"></i>
        <h1>WhatsApp Automation</h1>
        <span class="wa-badge">Active</span>
    </div>

    <div class="card">
        <p class="card-label">Google Maps</p>
        <div class="btn-group">
            <button class="primary" id="open-maps"><i class="ti ti-map-2"></i> Open </button>
            <button class="primary" id="go-btn"><i class="ti ti-player-play"></i> Go</button>
            <button class="stop" id="stop-maps-btn"><i class="ti ti-player-stop"></i> Stop</button>
        </div>
    </div>

    <div class="card">
        <p class="card-label">WhatsApp</p>
        <div class="btn-group">
            <button class="primary" id="open-whatsapp-btn"><i class="ti ti-brand-whatsapp"></i> Open</button>
            <button class="primary" id="run-whatsapp-btn"><i class="ti ti-send"></i> Run</button>
            <button class="stop" id="stop-whatsapp-btn"><i class="ti ti-player-stop"></i> Stop</button>
        </div>
    </div>

    <div class="card">
        <div class="toggle-row">
            <span class="toggle-label"><i class="ti ti-message-circle"></i> Send messages</span>
            <label class="toggle">
                <input type="checkbox" name="allow-send-message-checkbox" id="allow-send-message-checkbox">
                <div class="toggle-track"></div>
                <div class="toggle-thumb"></div>
            </label>
        </div>
    </div>

    <div class="card">
        <p class="card-label">Status</p>
        <div class="status-row">
            <div class="status-pill">
                <div class="status-dot"></div>
                <span id="status"></span>
            </div>
            <button class="copy-all-btn"><i class="ti ti-copy"></i> Copy all</button>
        </div>
        <div class="numbers-list" id="phone-numbers-section">
            <div class="phone-numbers"></div>
        </div>
    </div>

    <div class="card">
        <div class="form-group">
            <label class="form-label" for="select-map-search-query">Find companies by query</label>
            <select id="select-map-search-query">
                <option>— Select a query —</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label" for="find-number-input">Find company by number</label>
            <input type="text" id="find-number-input" placeholder="Enter phone number…">
            <div id="found-numbers"></div>
        </div>
    </div>

    <script src="./sidepanel.js"></script>

</body>
</html>
